<!DOCTYPE html>
<html>
    <head>
        <title>Cadastrando Aluno</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    </head>
    <body>
    <center>
        <form action="CadastrarAluno" method="POST">
            <table border="1">
                <tbody>
                    <tr>
                        <td>Nome do Aluno</td>
                        <td>
                            <input type="text" name="nome_aluno" value="" placeholder="Fulano"/>
                        </td>
                    </tr>
                    <tr>
                        <td>Sobrenome do Aluno</td>
                        <td>
                            <input type="text" name="sobrenome_aluno" value="" placeholder="Da Silva"/>
                        </td>
                    </tr>
                    <tr>
                        <td>Matricula do Aluno</td>
                        <td>
                            <input type="text" name="matricula_aluno" value=""/>
                        </td>
                    </tr>
                </tbody>
            </table>
            <input type="submit" value="Cadastrar Aluno" name="btnCadastrarAluno"/>
        </form>
    </center>
    </body>
</html>
